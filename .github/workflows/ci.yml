name: DevOps CI Pipeline

on:
  push:
    branches:
      - develop
      - master
  pull_request:
    branches:
      - develop
      - master

jobs:
  test-and-build:
    runs-on: ubuntu-latest

    steps:

      # Step 1: Checkout repository
      - name: Checkout repository
        uses: actions/checkout@v3

      # Step 2: Cache pip dependencies (faster builds)
      - name: Cache pip dependencies
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      # Step 3: Set up Python
      - name: Set up Python 3.12
        uses: actions/setup-python@v4
        with:
          python-version: "3.12"

      # Step 4: Install dependencies
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r app/requirements.txt
          pip install pytest bandit pip-audit

      # Step 5: Clean Python cache
      - name: Clean __pycache__
        run: |
          find . -type d -name "__pycache__" -exec rm -r {} +

      # Step 6: Set PYTHONPATH
      - name: Set PYTHONPATH
        run: echo "PYTHONPATH=$(pwd)" >> $GITHUB_ENV

      # Step 7: Run tests
      - name: Run tests
        run: pytest

      # Step 8: Run security scan
      - name: Run Bandit security scan
        run: bandit -r app -x B104 --exit-zero

      # Step 9: Scan dependencies
      - name: Scan dependencies for vulnerabilities
        run: pip-audit

      # Step 10: Sanitize branch name for Docker tag (make it safe)
      - name: Sanitize branch name
        run: |
          SAFE_BRANCH=${GITHUB_REF_NAME//\//-}
          echo "SAFE_BRANCH=$SAFE_BRANCH" >> $GITHUB_ENV

      # Step 11: Log in to Docker Hub
      - name: Log in to Docker Hub
        run: |
          echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      # Step 12: Build Docker image and measure build time
      - name: Build Docker image and measure build time
        run: |
          echo "Starting Docker build..."
          start=$(date +%s)

          docker build \
            -f app/Dockerfile \
            -t ${{ secrets.DOCKER_USERNAME }}/enterprise-devops-app:${{ github.sha }} \
            -t ${{ secrets.DOCKER_USERNAME }}/enterprise-devops-app:latest \
            -t ${{ secrets.DOCKER_USERNAME }}/enterprise-devops-app:$SAFE_BRANCH \
            app

          end=$(date +%s)
          build_time=$((end-start))
          echo "Docker Build Time: $build_time seconds"

      # Step 13: Display Docker image size          
      - name: Check Docker image size
        run: |
          docker images ${{ secrets.DOCKER_USERNAME }}/enterprise-devops-app \
          --format "table {{.Repository}}\t{{.Tag}}\t{{.Size}}"
          
      # Step 14: Scan Docker image with Trivy
      - name: Scan Docker image with Trivy
        uses: aquasecurity/trivy-action@0.24.0
        with:
          image-ref: ${{ secrets.DOCKER_USERNAME }}/enterprise-devops-app:${{ github.sha }}

      # Step 15: Push Docker image
      - name: Push Docker image to Docker Hub
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/enterprise-devops-app:${{ github.sha }}
          docker push ${{ secrets.DOCKER_USERNAME }}/enterprise-devops-app:latest
          docker push ${{ secrets.DOCKER_USERNAME }}/enterprise-devops-app:$SAFE_BRANCH
