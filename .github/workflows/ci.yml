name: DevOps CI Pipeline

on:
  push:
    branches:
      - develop
      - master
  pull_request:
    branches:
      - develop
      - master

jobs:

  # =========================================
  # JOB 1 — TEST, BUILD, SECURITY, PUSH IMAGE
  # =========================================
  test-and-build:

    runs-on: ubuntu-latest

    steps:

      # 1️⃣ Download repository code
      - name: Checkout repository
        uses: actions/checkout@v3

      # 2️⃣ Cache Python dependencies (faster builds)
      - name: Cache pip dependencies
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}

      # 3️⃣ Install Python
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.12"

      # 4️⃣ Install project dependencies
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r app/requirements.txt
          pip install pytest bandit pip-audit

      # 5️⃣ Remove Python cache files
      - name: Clean Python cache
        run: |
          find . -type d -name "__pycache__" -exec rm -r {} +

      # 6️⃣ Fix Python module paths
      - name: Set PYTHONPATH
        run: echo "PYTHONPATH=$(pwd)" >> $GITHUB_ENV

      # 7️⃣ Run automated tests
      - name: Run tests
        run: pytest

      # 8️⃣ Static security scan
      - name: Run Bandit security scan
        run: bandit -r app -x B104 --exit-zero

      # 9️⃣ Dependency vulnerability scan
      - name: Scan dependencies
        run: pip-audit

      # 🔟 Make branch name safe for Docker tags
      - name: Sanitize branch name
        run: |
          SAFE_BRANCH=${GITHUB_REF_NAME//\//-}
          echo "SAFE_BRANCH=$SAFE_BRANCH" >> $GITHUB_ENV

      # 1️⃣1️⃣ Login to DockerHub
      - name: Login to Docker Hub
        run: |
          echo "${{ secrets.DOCKER_PASSWORD }}" | docker login \
          -u "${{ secrets.DOCKER_USERNAME }}" \
          --password-stdin

      # 1️⃣2️⃣ Build Docker image
      - name: Build Docker image
        run: |
          echo "Starting Docker build..."

          docker build \
            -f app/Dockerfile \
            -t ${{ secrets.DOCKER_USERNAME }}/enterprise-devops-app:${{ github.sha }} \
            -t ${{ secrets.DOCKER_USERNAME }}/enterprise-devops-app:latest \
            -t ${{ secrets.DOCKER_USERNAME }}/enterprise-devops-app:$SAFE_BRANCH \
            --label project=enterprise-devops-platform \
            app

      # 1️⃣3️⃣ Show Docker image size
      - name: Check Docker image size
        run: |
          docker images ${{ secrets.DOCKER_USERNAME }}/enterprise-devops-app \
          --format "table {{.Repository}}\t{{.Tag}}\t{{.Size}}"

      # 1️⃣4️⃣ Scan Docker image for vulnerabilities
      - name: Scan Docker image
        uses: aquasecurity/trivy-action@0.24.0
        with:
          image-ref: ${{ secrets.DOCKER_USERNAME }}/enterprise-devops-app:${{ github.sha }}

      # 1️⃣5️⃣ Push Docker image to DockerHub
      - name: Push Docker image
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/enterprise-devops-app:${{ github.sha }}
          docker push ${{ secrets.DOCKER_USERNAME }}/enterprise-devops-app:latest
          docker push ${{ secrets.DOCKER_USERNAME }}/enterprise-devops-app:$SAFE_BRANCH


  # =========================================
  # JOB 2 — DEPLOY TO KUBERNETES
  # =========================================
  deploy-to-k8s:

    needs: test-and-build
    runs-on: ubuntu-latest

    steps:

      # 1️⃣ Checkout repo again
      - name: Checkout repository
        uses: actions/checkout@v3

      # 2️⃣ Setup Kubernetes cluster (Minikube)
      - name: Setup Minikube
        uses: manusa/actions-setup-minikube@v2.16.1
        with:
          minikube version: 'v1.34.0'
          kubernetes version: 'v1.30.0'
          driver: 'docker'
          github token: ${{ secrets.GITHUB_TOKEN }}
          start args: '--cpus=4 --memory=4000mb --addons=ingress'

      # 3️⃣ Verify cluster
      - name: Check cluster
        run: |
          kubectl cluster-info
          kubectl get nodes

      # 4️⃣ Deploy application
      - name: Deploy to Kubernetes
        run: |
          kubectl apply -f kubernetes/deployment.yaml
          kubectl apply -f kubernetes/service.yaml

      # 5️⃣ Check deployment status
      - name: Verify deployment
        run: |
          kubectl get pods
          kubectl get services
          kubectl rollout status deployment/enterprise-devops-app
