name: DevOps CI Pipeline

on:
  push:
    branches:
      - develop
      - main
  pull_request:
    branches:
      - develop
      - main

jobs:
  test-and-build:
    runs-on: ubuntu-latest

    steps:

      # Checkout repository
      - name: Checkout repository
        uses: actions/checkout@v4

      # Cache pip dependencies (faster builds)
      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      # Setup Python
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # Install dependencies
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r app/requirements.txt
          pip install pytest bandit pip-audit

      # Clean Python cache
      - name: Clean __pycache__
        run: |
          find . -type d -name "__pycache__" -exec rm -r {} +

      # Set PYTHONPATH
      - name: Set PYTHONPATH
        run: echo "PYTHONPATH=$(pwd)" >> $GITHUB_ENV

      # Run tests
      - name: Run tests
        run: pytest

      # Run security scan
      - name: Run Bandit security scan
        run: bandit -r app -x B104 --exit-zero

      # Scan dependencies
      - name: Scan dependencies for vulnerabilities
        run: pip-audit

      # Login to Docker Hub
      - name: Log in to Docker Hub
        run: |
          echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      # Build Docker image + measure build time
      - name: Build Docker image and measure build time
        run: |
          echo "Starting Docker build..."

          start=$(date +%s)

          docker build \
                -t ${{ secrets.DOCKER_USERNAME }}/enterprise-devops-app:${{ github.sha }} \
                -t ${{ secrets.DOCKER_USERNAME }}/enterprise-devops-app:latest \
                -t ${{ secrets.DOCKER_USERNAME }}/enterprise-devops-app:${{ github.ref_name }} \
                .
                
          end=$(date +%s)
          build_time=$((end-start))

          echo "Docker Build Time: $build_time seconds"

      # Display Docker image size
      - name: Check Docker image size
        run: |
          docker images ${{ secrets.DOCKER_USERNAME }}/enterprise-devops-app:${{ github.sha }} \
          --format "Docker Image Size: {{.Size}}"
          
      # Scan Docker image for vulnerabilities
      - name: Scan Docker image with Trivy
        uses: aquasecurity/trivy-action@0.24.0
        with:
          image-ref: ${{ secrets.DOCKER_USERNAME }}/enterprise-devops-app:${{ github.sha }}

      # Push Docker image
      - name: Push Docker image to Docker Hub
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/enterprise-devops-app:${{ github.sha }}
          docker push ${{ secrets.DOCKER_USERNAME }}/enterprise-devops-app:latest
          docker push ${{ secrets.DOCKER_USERNAME }}/enterprise-devops-app:${{ github.ref_name }}
