name: Enterprise DevOps CI Pipeline

on:
  push:
    branches:
      - develop
      - master
  pull_request:
    branches:
      - develop
      - master

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:

  # ==============================
  # JOB 1 — CODE QUALITY
  # ==============================
  code-quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: "3.12"
      - run: pip install bandit
      - run: bandit -r app -x B104 --exit-zero

  # ==============================
  # JOB 2 — RUN TESTS
  # ==============================
  tests:
    runs-on: ubuntu-latest
    needs: code-quality
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: "3.12"
      - run: |
          python -m pip install --upgrade pip
          pip install -r app/requirements.txt
          pip install pytest
      - run: echo "PYTHONPATH=$(pwd)" >> $GITHUB_ENV
      - run: pytest

  # ==============================
  # JOB 3 — DEPENDENCY SECURITY SCAN
  # ==============================
  dependency-scan:
    runs-on: ubuntu-latest
    needs: tests
    steps:
      - uses: actions/checkout@v3
      - run: pip install pip-audit
      - run: |
          echo "Running pip-audit (non-blocking)..."
          pip-audit || echo "Vulnerabilities detected but continuing pipeline..."

  # ==============================
  # JOB 4 — DOCKER BUILD, PUSH & SCAN
  # ==============================
  docker-build-push-scan:
    runs-on: ubuntu-latest
    needs: dependency-scan
    steps:
      - uses: actions/checkout@v3

      - name: Sanitize branch name
        run: |
          SAFE_BRANCH=${GITHUB_REF_NAME//\//-}
          echo "SAFE_BRANCH=$SAFE_BRANCH" >> $GITHUB_ENV

      - name: Set Docker image tag
        run: |
          IMAGE_TAG=${{ secrets.DOCKER_USERNAME }}/enterprise-devops-app:${{ github.sha }}
          echo "IMAGE_TAG=$IMAGE_TAG" >> $GITHUB_ENV

      - name: Login to Docker Hub
        run: |
          echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Build Docker image
        run: |
          docker build -f app/Dockerfile \
            -t $IMAGE_TAG \
            -t ${{ secrets.DOCKER_USERNAME }}/enterprise-devops-app:latest \
            -t ${{ secrets.DOCKER_USERNAME }}/enterprise-devops-app:$SAFE_BRANCH \
            app

      - name: Push Docker image to Docker Hub
        run: |
          docker push $IMAGE_TAG
          docker push ${{ secrets.DOCKER_USERNAME }}/enterprise-devops-app:latest
          docker push ${{ secrets.DOCKER_USERNAME }}/enterprise-devops-app:$SAFE_BRANCH

      - name: Pull image from Docker Hub (verify)
        run: |
          docker pull $IMAGE_TAG
          docker images | grep enterprise-devops-app

      - name: Scan Docker image with Trivy
        uses: aquasecurity/trivy-action@0.24.0
        with:
          image-ref: ${{ env.IMAGE_TAG }}
          format: table
          exit-code: 0

  # ==============================
  # JOB 5 — DEPLOY TO KUBERNETES
  # ==============================
  deploy-to-k8s:
    runs-on: ubuntu-latest
    needs: docker-build-push-scan
    steps:
      - uses: actions/checkout@v3

      - name: Setup Minikube
        uses: manusa/actions-setup-minikube@v2.16.1
        with:
          minikube version: "1.34.0"
          kubernetes version: "v1.30.0"
          driver: docker
          github token: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify Kubernetes cluster
        run: |
          kubectl cluster-info
          kubectl get nodes

      - name: Deploy Kubernetes resources
        run: |
          kubectl apply -f kubernetes/namespace.yaml
          kubectl apply -f kubernetes/configmap.yaml
          kubectl apply -f kubernetes/secret.yaml
          kubectl apply -f kubernetes/deployment.yaml
          kubectl apply -f kubernetes/service.yaml
          kubectl apply -f kubernetes/hpa.yaml
          kubectl apply -f kubernetes/pdb.yaml
          

      - name: Wait for deployment rollout
        run: |
          kubectl rollout status deployment/enterprise-devops-app -n enterprise-devops --timeout=120s

      - name: Verify deployment
        run: |
          kubectl get pods -n enterprise-devops
          kubectl get svc -n enterprise-devops

      - name: Wait for pods to be ready
        run: |
           kubectl wait --for=condition=ready pod \
             -l app=enterprise-devops-app \
             -n enterprise-devops \
             --timeout=120s
  
      - name: Verify deployment
        run: |
          kubectl get pods -n enterprise-devops
          kubectl get svc -n enterprise-devops
        
      - name: Test application endpoint
        run: |
          echo "Starting port-forward..."
          kubectl port-forward service/enterprise-devops-app-service 5000:5000 -n enterprise-devops > /dev/null 2>&1 &
          PF_PID=$!
      
          echo "Waiting for application..."
          timeout 30s bash -c 'until curl -sf http://localhost:5000; do sleep 2; done'
      
          echo "Running health checks..."
          curl -f http://localhost:5000/health
          curl -f http://localhost:5000/ready
      
          echo "Running main endpoint test..."
          curl -f http://localhost:5000
      
          echo "✅ Application is fully functional."
          echo "Deployment + Tests SUCCESS ✅" >> $GITHUB_STEP_SUMMARY
      
          kill $PF_PID
      
      - name: Debug if failure
        if: failure()
        run: |
          echo "===== PODS ====="
          kubectl get pods -n enterprise-devops
      
          echo "===== DESCRIBE ====="
          kubectl describe pods -n enterprise-devops
      
          echo "===== LOGS ====="
          kubectl logs -l app=enterprise-devops-app -n enterprise-devops --tail=50
