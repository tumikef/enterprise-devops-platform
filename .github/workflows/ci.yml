name: Enterprise DevOps CI Pipeline

on:
  push:
    branches:
      - develop
      - master
  pull_request:
    branches:
      - develop
      - master
# Force Node.js 24 for all JS actions (removes deprecation warnings)
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:

  # =========================================
  # JOB 1 — CODE QUALITY
  # =========================================
  code-quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.12"

      - name: Install security tools
        run: pip install bandit

      - name: Run static security scan
        run: bandit -r app -x B104 --exit-zero


  # =========================================
  # JOB 2 — RUN TESTS
  # =========================================
  tests:
    runs-on: ubuntu-latest
    needs: code-quality
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r app/requirements.txt
          pip install pytest

      - name: Set PYTHONPATH
        run: echo "PYTHONPATH=$(pwd)" >> $GITHUB_ENV

      - name: Run tests
        run: pytest


  # =========================================
  # JOB 3 — DEPENDENCY SECURITY SCAN
  # =========================================
  dependency-scan:
    runs-on: ubuntu-latest
    needs: tests
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Install pip-audit
        run: pip install pip-audit

      - name: Scan dependencies (non-blocking)
        run: |
          echo "Running pip-audit..."
          pip-audit || echo "Vulnerabilities detected but continuing pipeline..."
          

  # =========================================
  # JOB 4 — BUILD DOCKER IMAGE
  # =========================================
  build-image:
    runs-on: ubuntu-latest
    needs: dependency-scan
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Sanitize branch name for Docker tags
        run: |
          SAFE_BRANCH=${GITHUB_REF_NAME//\//-}
          echo "SAFE_BRANCH=$SAFE_BRANCH" >> $GITHUB_ENV

      - name: Build Docker image
        run: |
          docker build \
            -f app/Dockerfile \
            -t ${{ secrets.DOCKER_USERNAME }}/enterprise-devops-app:${{ github.sha }} \
            -t ${{ secrets.DOCKER_USERNAME }}/enterprise-devops-app:latest \
            -t ${{ secrets.DOCKER_USERNAME }}/enterprise-devops-app:$SAFE_BRANCH \
            app

      - name: Show Docker image size
        run: |
          docker images ${{ secrets.DOCKER_USERNAME }}/enterprise-devops-app \
          --format "table {{.Repository}}\t{{.Tag}}\t{{.Size}}"

      - name: Scan Docker image with Trivy
        uses: aquasecurity/trivy-action@0.24.0
        with:
          image-ref: ${{ secrets.DOCKER_USERNAME }}/enterprise-devops-app:${{ github.sha }}


  # =========================================
  # JOB 6 — PUSH IMAGE TO DOCKERHUB
  # =========================================
  push-image:
    runs-on: ubuntu-latest
    needs: image-scan
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Login to Docker Hub
        run: |
          echo "${{ secrets.DOCKER_PASSWORD }}" | docker login \
          -u "${{ secrets.DOCKER_USERNAME }}" \
          --password-stdin

      - name: Rebuild Docker image (fresh runner)
        run: |
          docker build \
            -f app/Dockerfile \
            -t ${{ secrets.DOCKER_USERNAME }}/enterprise-devops-app:${{ github.sha }} \
            -t ${{ secrets.DOCKER_USERNAME }}/enterprise-devops-app:latest \
            -t ${{ secrets.DOCKER_USERNAME }}/enterprise-devops-app:$SAFE_BRANCH \
            app

      - name: Push Docker images
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/enterprise-devops-app:${{ github.sha }}
          docker push ${{ secrets.DOCKER_USERNAME }}/enterprise-devops-app:latest
          docker push ${{ secrets.DOCKER_USERNAME }}/enterprise-devops-app:$SAFE_BRANCH


  # =========================================
  # JOB 7 — DEPLOY TO KUBERNETES
  # =========================================
  deploy-to-k8s:
    runs-on: ubuntu-latest
    needs: push-image
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup Minikube
        uses: manusa/actions-setup-minikube@v2.16.1
        with:
          minikube version: '1.34.0'
          kubernetes version: 'v1.30.0'
          driver: 'docker'
          github token: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify cluster
        run: |
          kubectl cluster-info
          kubectl get nodes

      - name: Deploy application
        run: |
          kubectl apply -f kubernetes/deployment.yaml
          kubectl apply -f kubernetes/service.yaml

      - name: Verify deployment
        run: |
          kubectl get pods
          kubectl get services
          kubectl rollout status deployment/enterprise-devops-app
