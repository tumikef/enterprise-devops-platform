name: DevOps CI

# Trigger pipeline on pushes or pull requests to these branches
on:
  push:
    branches: [ develop, main ]
  pull_request:
    branches: [ develop, main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Checkout your code
      - name: Checkout code
        uses: actions/checkout@v3

      # Step 2: Set up Python
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: 3.12

      # Step 3: Install dependencies
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r app/requirements.txt

      # Step 4: Run tests
      - name: Run Unit Tests
        run: |
          pytest tests/

      # Step 5: Build Docker image
      - name: Build Docker Image
        run: |
          docker build -f app/Dockerfile -t enterprise-devops-app .

      # Step 6: (Optional) Push Docker image
      # Uncomment if you set DOCKER_USERNAME/DOCKER_PASSWORD secrets
      #- name: Log in to Docker Hub
      #  run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin
