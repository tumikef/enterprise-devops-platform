name: DevOps CI Pipeline

on:
  push:
    branches:
      - develop
      - master
  pull_request:
    branches:
      - develop
      - master

jobs:
  # ==========================
  # Job 1: Test & Build
  # ==========================
  test-and-build:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout repository
      - name: Checkout repository
        uses: actions/checkout@v3

      # 2️⃣ Cache pip dependencies for faster builds
      - name: Cache pip dependencies
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      # 3️⃣ Set up Python
      - name: Set up Python 3.12
        uses: actions/setup-python@v4
        with:
          python-version: "3.12"

      # 4️⃣ Install dependencies
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r app/requirements.txt
          pip install pytest bandit pip-audit

      # 5️⃣ Clean Python cache
      - name: Clean __pycache__
        run: |
          find . -type d -name "__pycache__" -exec rm -r {} +

      # 6️⃣ Set PYTHONPATH
      - name: Set PYTHONPATH
        run: echo "PYTHONPATH=$(pwd)" >> $GITHUB_ENV

      # 7️⃣ Run tests
      - name: Run tests
        run: pytest

      # 8️⃣ Run Bandit security scan
      - name: Run Bandit security scan
        run: bandit -r app -x B104 --exit-zero

      # 9️⃣ Scan dependencies for vulnerabilities
      - name: Scan dependencies
        run: pip-audit

      # 🔟 Sanitize branch name for Docker tags
      - name: Sanitize branch name
        run: |
          SAFE_BRANCH=${GITHUB_REF_NAME//\//-}
          echo "SAFE_BRANCH=$SAFE_BRANCH" >> $GITHUB_ENV

      # 1️⃣1️⃣ Docker Hub login
      - name: Log in to Docker Hub
        run: |
          echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      # 1️⃣2️⃣ Build Docker image + measure build time
      - name: Build Docker image and measure build time
        run: |
          echo "Starting Docker build..."
          start=$(date +%s)

          docker build \
            -f app/Dockerfile \
            -t ${{ secrets.DOCKER_USERNAME }}/enterprise-devops-app:${{ github.sha }} \
            -t ${{ secrets.DOCKER_USERNAME }}/enterprise-devops-app:latest \
            -t ${{ secrets.DOCKER_USERNAME }}/enterprise-devops-app:$SAFE_BRANCH \
            --label project=enterprise-devops-platform \
            app

          end=$(date +%s)
          build_time=$((end-start))
          echo "Docker Build Time: $build_time seconds"

      # 1️⃣3️⃣ Display Docker image size
      - name: Check Docker image size
        run: |
          docker images ${{ secrets.DOCKER_USERNAME }}/enterprise-devops-app \
          --format "table {{.Repository}}\t{{.Tag}}\t{{.Size}}"

      # 1️⃣4️⃣ Scan Docker image for vulnerabilities
      - name: Scan Docker image with Trivy
        uses: aquasecurity/trivy-action@0.24.0
        with:
          image-ref: ${{ secrets.DOCKER_USERNAME }}/enterprise-devops-app:${{ github.sha }}

      # 1️⃣5️⃣ Push Docker image to Docker Hub
      - name: Push Docker image
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/enterprise-devops-app:${{ github.sha }}
          docker push ${{ secrets.DOCKER_USERNAME }}/enterprise-devops-app:latest
          docker push ${{ secrets.DOCKER_USERNAME }}/enterprise-devops-app:$SAFE_BRANCH

  # ==========================
  # Job 2: Kubernetes Deployment
  # ==========================
  #############################

      # 1️⃣5️⃣ Setup Minikube + Kubectl
      #############################
      - name: Start Minikube
        uses: medyagh/setup-minikube@latest
        with:
           minikube-version: '1.34.0'
           driver: 'docker'
           container-runtime: 'containerd'
           kubernetes-version: 'v1.32.0'
           cpus: '4'
           memory: '4000m'
           addons: 'ingress,dashboard'

      - name: Start Minikube
        run: |
          minikube start --driver=docker
          kubectl cluster-info
      # Explanation: Prepares a local Kubernetes cluster for deployment testing.

      #############################
      # 1️⃣6️⃣ Deploy to Kubernetes
      #############################
      - name: Deploy to Minikube
        run: |
          kubectl apply -f kubernetes/deployment.yaml
          kubectl apply -f kubernetes/service.yaml
          kubectl get pods
          kubectl rollout status deployment/enterprise-devops-app
